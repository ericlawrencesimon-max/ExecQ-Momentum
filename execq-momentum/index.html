async function fetchBriefing(){ss({briefLoading:true,briefArticles:[],briefError:null,briefExpanded:{},briefCopied:{}});const{ud,briefSources}=S;const prompt=`You are an elite executive intelligence curator. Generate a personalized morning briefing.\nPROFILE: Name: ${ud.name||'Executive'}, Title: ${ud.title||'Senior Leader'}, Industry: ${ud.industry||'Technology'}, Focus: ${ud.expertise||'Leadership, Strategy'}, Goals: ${(ud.goals||[]).join(', ')||'Build influence'}, Sources: ${briefSources.join(', ')}\nGenerate exactly 5 articles: industry trend, leadership insight, board/governance angle, thought leadership angle, wildcard edge insight.\nFor each write a ready-to-post LinkedIn comment: first person voice, 3-5 sentences, opinionated, ends with a question, does NOT start with "I", no hashtags.\nRespond ONLY with a JSON array, no markdown:\n[{"category":"Industry Trend","categoryColor":"amber","source":"Forbes","title":"headline","summary":"2-3 sentence summary","relevance":94,"readTime":"4 min","linkedinDraft":"Ready-to-post LinkedIn comment."}]`;try{const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});const data=await r.json();if(data.error){ss({briefLoading:false,briefError:'API error: '+data.error.message});return;}const text=data.content?.find(b=>b.type==='text')?.text||'';const articles=JSON.parse(text.replace(/```json|```/g,'').trim());ss({briefLoading:false,briefArticles:articles,briefSetup:true});}catch(e){ss({briefLoading:false,briefError:'Error: '+e.message});}}

return`<div class="app-body"><div class="top-bar">${logo()}</div><p style="font-size:22px;font-weight:800;color:#eef0f7;margin-bottom:4px">Opportunities 🎯</p><p style="font-size:13px;color:#6e7a96;margin-bottom:16px;font-style:italic">Matched to your goals · Ranked by impact</p>${loading?`<div style="display:flex;align-items:center;gap:12px;background:#1a2640;border-radius:14px;padding:16px;margin-bottom:20px;border:1px solid rgba(41,196,176,0.15)"><div class="spin"></div><div><p style="font-size:13px;font-weight:700;color:#29c4b0;margin-bottom:3px">Scanning opportunities...</p><p style="font-size:11px;color:#6e7a96">Matching to your profile and goals</p></div></div>${[1,2,3,4].map(()=>`<div class="card"><div style="display:flex;gap:8px;margin-bottom:12px"><div class="skel" style="height:22px;width:80px"></div><div class="skel" style="height:22px;width:60px"></div><div class="skel" style="height:22px;width:28px;margin-left:auto"></div></div><div class="skel" style="height:18px;width:80%;margin-bottom:6px"></div><div class="skel" style="height:13px;width:50%;margin-bottom:10px"></div><div class="skel" style="height:13px;width:100%"></div></div>`).join('')}`:''}${err?`<div style="background:rgba(224,90,122,0.08);border:1px solid rgba(224,90,122,0.2);border-radius:12px;padding:16px;margin-bottom:16px"><p style="font-size:13px;color:#e05a7a;font-weight:600;margin-bottom:6px">Couldn't load opportunities</p><p style="font-size:12px;color:#b0b8d0;margin-bottom:12px;word-break:break-all">${err}</p><button class="btn btn-gold" onclick="fetchOpps()">Try Again</button></div>`:''}${!loading&&opps.length>0?`<div style="display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px">${allFilters.map(f=>`<div onclick="ss({oppsFilter:'${f}'})" class="click" style="padding:7px 14px;border-radius:20px;background:${oppsFilter===f?'rgba(236,191,90,0.12)':'#1a2640'};border:1px solid ${oppsFilter===f?'rgba(236,191,90,0.35)':'rgba(255,255,255,0.08)'};font-size:11px;font-weight:700;color:${oppsFilter===f?'#ecbf5a':'#6e7a96'};white-space:nowrap;flex-shrink:0">${f==='all'?'All':GOAL_LABELS[f]||f}</div>`).join('')}</div>${filtered.length===0?`<p style="font-size:13px;color:#6e7a96;text-align:center;padding:20px">No opportunities for this goal yet.</p>`:''}${filtered.map((o,i)=>renderOppCard(o,i)).join('')}<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-gold" style="flex:1;margin-bottom:0;padding:12px" onclick="fetchOpps()">↻ Refresh</button><button class="btn btn-ghost" style="flex:1;margin-bottom:0;padding:12px" onclick="ss({oppsManualOpen:!S.oppsManualOpen})">+ Add Manually</button></div>${S.oppsManualOpen?renderManualForm():''}`:''}${!loading&&!err&&opps.length===0&&oppsSetup?`<button class="btn btn-gold" onclick="fetchOpps()">Find My Opportunities ⚡</button>`:''}​</div>`;}
function renderProfile(){const{ud,indexResult:ir}=S;const score=ir?.total??0;const lv=getLevel(score);const sec=S.profSec;const hist=[...HIST.slice(0,-1),{month:'Now',total:score||HIST[HIST.length-1].total}];const delta=hist[hist.length-1].total-hist[0].total;const initials=(ud.name||'EQ').slice(0,2).toUpperCase();
return`<div class="app-body"><div class="top-bar">${logo()}<div style="width:38px;height:38px;border-radius:10px;background:#1a2640;border:2px solid #ecbf5a;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#ecbf5a">${initials}</div></div><div style="background:#1a2640;border-radius:16px;padding:16px;margin-bottom:16px;display:flex;align-items:center;gap:16px;border:1px solid rgba(236,191,90,0.15)"><span id="prof-score" class="score-badge" style="font-size:52px;font-weight:800;line-height:1;color:${lv.color}">0</span><div style="flex:1"><p style="font-size:18px;font-weight:800;color:#eef0f7;margin-bottom:2px">${ud.name||'Your Name'}</p><p style="font-size:12px;color:#6e7a96;margin-bottom:8px">${ud.title||'Your Title'}${ud.company?' · '+ud.company:''}</p><div style="border:1px solid ${lv.color};border-radius:8px;padding:4px 8px;display:inline-block"><span style="font-size:11px;font-weight:700;color:${lv.color}">⭐ ${lv.label}</span></div></div></div>
<div style="display:flex;background:#1a2640;border-radius:12px;padding:4px;margin-bottom:20px">${['history','profile','settings'].map(t=>`<button onclick="ss({profSec:'${t}'})" style="flex:1;padding:10px;border-radius:10px;font-size:13px;font-weight:700;color:${sec===t?'#0a0f1e':'#6e7a96'};background:${sec===t?'#ecbf5a':'transparent'};border:none;cursor:pointer">${t.charAt(0).toUpperCase()+t.slice(1)}</button>`).join('')}</div>
${sec==='history'?`<div><div style="display:flex;background:#1a2640;border-radius:14px;padding:14px;margin-bottom:12px;border:1px solid rgba(255,255,255,0.07)">${[{l:'6 mo. ago',v:hist[0].total,c:'#eef0f7'},{l:'Growth',v:(delta>=0?'+':'')+delta,c:delta>=0?'#34d470':'#e05a7a'},{l:'Today',v:hist[hist.length-1].total,c:lv.color}].map((s,i)=>`<div style="flex:1;text-align:center;border-left:${i>0?'1px solid rgba(255,255,255,0.07)':'none'}"><p style="font-size:26px;font-weight:800;color:${s.c};line-height:1">${s.v}</p><p style="font-size:10px;color:#6e7a96;margin-top:3px">${s.l}</p></div>`).join('')}</div>${hist.map((d,i)=>{const prev=i>0?hist[i-1].total:d.total;const diff=d.total-prev;return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:11px;color:#6e7a96;width:32px;font-weight:600">${d.month}</span><div style="flex:1;height:5px;background:#1f2d4a;border-radius:3px;overflow:hidden"><div data-bar="${d.total}" data-delay="${(i*0.06).toFixed(2)}" style="height:100%;border-radius:3px;background:${lv.color};width:0%"></div></div><span style="font-size:11px;font-weight:700;color:#eef0f7;width:24px;text-align:right">${d.total}</span><span style="font-size:10px;font-weight:600;width:28px;text-align:right;color:${i===0?'#6e7a96':diff>=0?'#34d470':'#e05a7a'}">${i===0?'—':diff>=0?'+'+diff:diff}</span></div>`}).join('')}</div>`:''}
${sec==='profile'?`<div><p class="stitle" style="margin-top:0">PERSONAL INFO</p>${[{l:'First Name',k:'name',p:'e.g. Alex'},{l:'Job Title',k:'title',p:'e.g. SVP of Marketing'},{l:'Company',k:'company',p:'e.g. TechVanguard'},{l:'Expertise',k:'expertise',p:'e.g. AI in Marketing'}].map(f=>`<div class="ig"><label class="lbl">${f.l}</label><input type="text" id="edit-${f.k}" value="${ud[f.k]||''}" placeholder="${f.p}"></div>`).join('')}<button class="btn btn-gold" style="margin-top:12px" onclick="const d={...S.ud};['name','title','company','expertise'].forEach(k=>{const el=document.getElementById('edit-'+k);if(el)d[k]=el.value});ss({ud:d})">Save Changes</button></div>`:''}
${sec==='settings'?`<div><div style="background:#1a2640;border-radius:14px;border:1px solid rgba(255,255,255,0.07);overflow:hidden;margin-bottom:12px"><div style="padding:14px"><p style="font-size:13px;font-weight:700;color:#eef0f7;margin-bottom:2px">Email</p><p style="font-size:11px;color:#6e7a96">${S.user?.email||'demo@execq.app'}</p></div></div><div onclick="SA.signOut().then(()=>ss({screen:'splash',user:null,indexResult:null,signals:JSON.parse(JSON.stringify(DEF)),ud:{name:'',title:'',company:'',industry:'',expertise:'',goals:[],shareEcosystem:true,partnerActivations:true,searchAlerts:false}}))" class="click" style="background:#1a2640;border-radius:14px;border:1px solid rgba(255,255,255,0.07);padding:14px"><p style="font-size:14px;font-weight:600;color:#6e7a96">Sign Out</p></div></div>`:''}
</div>`;}
const TABS=[{id:'Home',icon:'⚡',lbl:'Home'},{id:'Briefing',icon:'☀️',lbl:'Briefing'},{id:'Signals',icon:'📡',lbl:'Signals'},{id:'Roadmap',icon:'🗺',lbl:'Roadmap'},{id:'Opps',icon:'🎯',lbl:'Opps'},{id:'Profile',icon:'👤',lbl:'Profile'}];
function tabBar(){return`<div class="tab-bar" id="tab-bar">${TABS.map(t=>`<div class="tab${S.activeTab===t.id?' active':''}" onclick="switchTab('${t.id}')"><span class="tab-icon">${t.icon}</span><span class="tab-lbl${S.activeTab===t.id?' active':''}">${t.lbl}</span></div>`).join('')}</div>`;}
function switchTab(t){ss({activeTab:t,sigDraft:JSON.parse(JSON.stringify(S.signals)),sigEdited:{}});setTimeout(()=>{const b=document.getElementById('tab-bar');if(b){const a=b.querySelector('.tab.active');if(a)a.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});}},60);}
function renderSkel(){return`<div class="app-body"><div class="top-bar">${logo()}</div><div class="skel" style="height:80px;width:60%;margin-bottom:8px"></div><div class="skel" style="height:14px;width:40%;margin-bottom:24px"></div><div class="card"><div class="skel" style="height:72px;width:50%;margin-bottom:12px"></div><div class="skel" style="height:8px;margin-bottom:6px"></div><div class="skel" style="height:8px;width:85%"></div></div></div>`;}
function renderApp(){if(S.showLI)return`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">${renderLIFlow()}</div>`;if(!S.skelDone){setTimeout(()=>ss({skelDone:true}),800);return`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">${renderSkel()}${tabBar()}</div>`;}const tabs={Home:renderHome,Briefing:renderBriefing,Signals:renderSignals,Roadmap:renderRoadmap,Opps:renderOpps,Profile:renderProfile};return`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">${(tabs[S.activeTab]||renderHome)()}${tabBar()}</div>`;}
function render(){const root=document.getElementById('root');if(!root)return;if(S.screen!=='app'){const map={loading:`<div style="display:flex;align-items:center;justify-content:center;height:100%"><div style="text-align:center"><div style="font-size:36px">⚡</div><div class="spin" style="margin:16px auto 0"></div></div></div>`,splash:renderSplash(),auth:renderAuth(),prof1:renderProf1(),prof2:renderProf2(),prof3:renderProf3(),prof4:renderProf4(),prof5:renderProf5(),calc:renderCalc()};root.innerHTML=map[S.screen]||map.loading;return;}root.innerHTML=renderApp();setTimeout(()=>{animateBars();[['home-score',S.indexResult?.total??0],['sig-score',calcIndex(S.sigDraft).total],['prof-score',S.indexResult?.total??0],['calc-score',S.calcResult?.total??0],['li3-s',S.indexResult?.total??0]].forEach(([id,val])=>{const el=document.getElementById(id);if(el&&val>0)animateCount(el,val,700);});const b=document.getElementById('tab-bar');if(b){const a=b.querySelector('.tab.active');if(a)a.scrollIntoView({behavior:'instant',inline:'center',block:'nearest'});}},60);}
SA.onAuthStateChanged(async(user)=>{if(user&&user.uid!=='demo'){const saved=await SDB.get(user.uid);if(saved&&saved.indexResult){S.ud={name:saved.name||'',title:saved.title||'',company:saved.company||'',industry:saved.industry||'',expertise:saved.expertise||'',goals:saved.goals||[],shareEcosystem:saved.shareEcosystem??true,partnerActivations:saved.partnerActivations??true,searchAlerts:saved.searchAlerts??false};S.indexResult=saved.indexResult;if(saved.signals){S.signals=saved.signals;S.sigDraft=JSON.parse(JSON.stringify(saved.signals));}ss({screen:'app',user,skelDone:false});}else ss({screen:S.screen==='loading'?'splash':S.screen,user});}else if(!user)ss({screen:'splash',user:null});});
render();
