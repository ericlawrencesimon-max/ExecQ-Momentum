async function fetchPost(){
  ss({postLoading:true,postResult:null,postError:null,postCopied:false});
  const{ud,indexResult:ir,postFormat:fmt,postTone:tone}=S;
  const score=ir?.total??0;const scores=ir?.scores??{};const lv=getLevel(score);
  const fmtMap={'thought_leadership':'a bold thought leadership take — share a contrarian or forward-looking perspective on a trend in their industry','personal_story':'a personal story or professional lesson — something they learned the hard way or a turning point in their career','industry_insight':'a sharp industry insight — data-driven or observation-based, positioned as an expert take','hot_take':'a hot take or provocative opinion — designed to spark conversation and comments'};
  const toneMap={'professional':'polished and authoritative — confident but not arrogant, uses precise language','conversational':'warm and direct — like talking to a smart colleague, uses contractions, feels human','bold':'provocative and punchy — short sentences, strong opinions, designed to stop the scroll'};
  const prompt='You are an elite LinkedIn ghostwriter for C-suite executives.\nPROFILE: Name: '+( ud.name||'Executive')+', Title: '+(ud.title||'Senior Leader')+', Industry: '+(ud.industry||'Technology')+', Expertise: '+(ud.expertise||'Leadership, Strategy')+', ExecQ Score: '+score+'/100 ('+lv.label+')\nWRITE: '+(fmtMap[fmt]||fmtMap['thought_leadership'])+'\nTONE: '+(toneMap[tone]||toneMap['professional'])+'\nRULES:\n- 150-220 words\n- Does NOT start with "I"\n- No hashtags in the body (add 3 relevant hashtags at the very end on their own line)\n- No emojis unless one strategic one at the very start\n- Has a hook first line that stops the scroll\n- Ends with a genuine question to drive comments\n- Sounds like a real executive wrote it, not AI\n- No cliches like "game-changer", "excited to share", "humbled"\nRespond ONLY with JSON: {"post":"full post text","hook":"first line only","hashtags":["tag1","tag2","tag3"]}';
  try{
    const r=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    if(data.error){ss({postLoading:false,postError:'API: '+data.error.message});return;}
    const text=data.content?.find(b=>b.type==='text')?.text||'';
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    ss({postLoading:false,postResult:parsed,postWeekCount:S.postWeekCount+1});
  }catch(e){ss({postLoading:false,postError:'Error: '+e.message});}
}
function copyPost(){
  const el=document.getElementById('post-output');
  if(!el)return;
  const text=el.innerText;
  navigator.clipboard.writeText(text).catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);});
  ss({postCopied:true});
  setTimeout(()=>ss({postCopied:false}),2500);
}

function renderSim(){
  // Initialize simDraft from current signals on first open
  if(!S.simDraft){const d=JSON.parse(JSON.stringify(S.signals));ss({simDraft:d});return renderSim();}
  const base=S.indexResult?.total??0;
  const baseLv=getLevel(base);
  const sim=calcIndex(S.simDraft);
  const simLv=getLevel(sim.total);
  const delta=sim.total-base;
  const baseScores=S.indexResult?.scores??{linkedin:0,press:0,speaking:0,podcast:0,blog:0,board:0};

  // Per-signal max values for sliders (matches SF field maxes)
  const MAXES={linkedin:{followers:50000,connections:5000,engagementRate:10},press:{mentionCount:50,avgOutletAuthority:100},speaking:{eventCount:20,avgEventTier:100},podcast:{appearanceCount:30,avgAudienceSize:100000},blog:{articleCount:40,avgPlatformAuthority:100},board:{roleCount:5}};
  const FIELD_LABELS={followers:'Followers',connections:'Connections',engagementRate:'Engagement %',mentionCount:'Press mentions',avgOutletAuthority:'Outlet prestige',eventCount:'Speaking events',avgEventTier:'Event prestige',appearanceCount:'Podcast appearances',avgAudienceSize:'Avg listeners',articleCount:'Articles published',avgPlatformAuthority:'Platform reach',roleCount:'Board roles'};
  const STEPS={followers:500,connections:100,engagementRate:0.1,mentionCount:1,avgOutletAuthority:1,eventCount:1,avgEventTier:1,appearanceCount:1,avgAudienceSize:1000,articleCount:1,avgPlatformAuthority:1,roleCount:1};

  function fmtVal(key,val){
    if(key==='followers'||key==='avgAudienceSize')return val>=1000?(val/1000).toFixed(val>=10000?0:1)+'k':String(val);
    if(key==='engagementRate')return val.toFixed(1)+'%';

  }

  const deltaColor=delta>0?'#34d470':delta<0?'#e05a7a':'#6e7a96';
  const deltaLabel=delta>0?'+'+delta:delta===0?'No change':String(delta);

  // Build slider rows for each source
  function sliderSection(src){
    const fields=SF[src.key];
    const simVals=S.simDraft[src.key];
    const baseVals=S.signals[src.key];

    return `<div style="background:#1a2640;border-radius:14px;padding:16px;margin-bottom:10px;border:1px solid rgba(255,255,255,0.08)">

        </div>
      </div>
      ${fields.map(f=>{
        const cur=simVals[f.key]||0;
        const base=baseVals[f.key]||0;
        const max=MAXES[src.key][f.key];
        const step=STEPS[f.key]||1;
        const pct=Math.min(100,Math.round(cur/max*100));
        const changed=cur!==base;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
            <span style="font-size:11px;font-weight:600;color:${changed?'#ecbf5a':'#6e7a96'}">${FIELD_LABELS[f.key]||f.key}</span>

              ${changed?`<span style="font-size:10px;color:#3a4660;text-decoration:line-through">${fmtVal(f.key,base)}</span>`:''}
              <span style="font-size:13px;font-weight:800;color:${changed?'#ecbf5a':'#eef0f7'}">${fmtVal(f.key,cur)}</span>
            </div>
          </div>
          <div style="position:relative;height:28px;display:flex;align-items:center">
            <div style="position:absolute;left:0;right:0;height:5px;background:#1f2d4a;border-radius:3px;overflow:hidden">
              <div style="height:100%;border-radius:3px;background:${src.color};width:${pct}%;transition:width 0.2s"></div>
            </div>
            <input type="range" min="0" max="${max}" step="${step}" value="${cur}" style="position:relative;width:100%;opacity:0;height:28px;cursor:pointer;z-index:2" oninput="(function(v){const d=JSON.parse(JSON.stringify(S.simDraft));d['${src.key}']['${f.key}']=parseFloat(v)||0;ss({simDraft:d})})(this.value)">
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  return `<div class="app-body">
    <div class="top-bar">${logo()}</div>
    <p style="font-size:22px;font-weight:800;color:#eef0f7;margin-bottom:4px">Score Simulator 🎯</p>

        <!-- Arrow + delta -->
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 8px">

        <div style="flex:1;text-align:center;padding:12px;background:${delta!==0?'rgba(236,191,90,0.04)':'transparent'};border-radius:12px;border:${delta!==0?'1px solid rgba(236,191,90,0.15)':'1px solid transparent'}">

          <p style="font-size:11px;font-weight:600;color:${simLv.color}">${simLv.label}</p>
        </div>
      </div>
      ${delta!==0?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07)">
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${SRCS.map(s=>{const bd=baseScores[s.key]||0;const sd=sim.scores[s.key]||0;const d=sd-bd;if(d===0)return '';return `<div style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;background:${d>0?'rgba(52,212,112,0.1)':'rgba(224,90,122,0.1)'};border:1px solid ${d>0?'rgba(52,212,112,0.25)':'rgba(224,90,122,0.25)'}"><span style="font-size:10px;font-weight:700;color:${s.color}">${s.label}</span><span style="font-size:10px;font-weight:800;color:${d>0?'#34d470':'#e05a7a'}">${d>0?'+'+d:d}</span></div>`;}).join('')}
        </div>
      </div>`:''}
    </div>

    ${delta!==0?`<!-- Level-up callout -->
    ${sim.total>=70&&base<70?`<div style="background:rgba(236,191,90,0.08);border:1px solid rgba(236,191,90,0.3);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px"><span style="font-size:24px">🏆</span><div><p style="font-size:13px;font-weight:700;color:#ecbf5a">You'd reach Board-Level Icon!</p><p style="font-size:11px;color:#b0b8d0">The top tier of the ExecQ Index.</p></div></div>`:''}
    ${sim.total>=55&&base<55?`<div style="background:rgba(107,159,245,0.08);border:1px solid rgba(107,159,245,0.3);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px"><span style="font-size:24px">⬆️</span><div><p style="font-size:13px;font-weight:700;color:#6b9ff5">You'd reach Industry Authority!</p><p style="font-size:11px;color:#b0b8d0">Top 15% of executives at your level.</p></div></div>`:''}
    ${sim.total>=40&&base<40?`<div style="background:rgba(52,212,112,0.08);border:1px solid rgba(52,212,112,0.3);border-radius:12px;padding:14px;margin-bottom:14px;display:flex;align-items:center;gap:12px"><span style="font-size:24px">🌟</span><div><p style="font-size:13px;font-weight:700;color:#34d470">You'd reach Rising Star!</p><p style="font-size:11px;color:#b0b8d0">Your brand is starting to work for you.</p></div></div>`:''}
    `:''}

    <!-- Signal sliders -->
    ${SRCS.map(src=>sliderSection(src)).join('')}

    <!-- Action buttons -->
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-gold" style="flex:2;margin-bottom:0;padding:13px" onclick="switchTab('Signals')">Enter These Stats for Real →</button>
      <button class="btn btn-ghost" style="flex:1;margin-bottom:0;padding:13px" onclick="ss({simDraft:JSON.parse(JSON.stringify(S.signals))})">Reset</button>
    </div>
    <p style="font-size:11px;color:#3a4660;text-align:center;margin-top:10px">Simulated scores don't affect your real ExecQ Index</p>
  </div>`;
}
